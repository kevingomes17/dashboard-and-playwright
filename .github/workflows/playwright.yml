name: Playwright tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: e2e (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            base-dashboard/package-lock.json
            playwright/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install base-dashboard dependencies
        working-directory: base-dashboard
        run: npm ci

      - name: Install Playwright dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Chromium
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 14

      - name: Upload Playwright test artifacts (traces, screenshots)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: playwright/test-results/
          retention-days: 14

      - name: Get Allure history from gh-pages
        if: ${{ !cancelled() }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Merge previous Allure history into new results
        if: ${{ !cancelled() }}
        run: |
          mkdir -p playwright/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -R gh-pages/history/* playwright/allure-results/history/ || true
          fi

      - name: Build Allure report
        if: ${{ !cancelled() }}
        working-directory: playwright
        run: npx allure generate allure-results -o ../allure-history --clean

      - name: Upload Allure report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
          retention-days: 14

      - name: Deploy Allure report to gh-pages
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
